name: 打包发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  o:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 资源准备
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install -y -qq librsvg2-bin > /dev/null 2>&1
          
          rm -rf app .gradle *.lock
          mkdir -p app/src/main/res/{mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi},drawable,drawable-nodpi}
          
          rsvg-convert -w 48 -h 48 icon.svg -o app/src/main/res/mipmap-mdpi/icon.png
          rsvg-convert -w 72 -h 72 icon.svg -o app/src/main/res/mipmap-hdpi/icon.png
          rsvg-convert -w 96 -h 96 icon.svg -o app/src/main/res/mipmap-xhdpi/icon.png
          rsvg-convert -w 144 -h 144 icon.svg -o app/src/main/res/mipmap-xxhdpi/icon.png
          rsvg-convert -w 192 -h 192 icon.svg -o app/src/main/res/mipmap-xxxhdpi/icon.png
          rsvg-convert -w 320 -h 180 icon_tv.svg -o app/src/main/res/drawable-nodpi/tv.png
          rm -r icon.svg icon_tv.svg

          if [ -d "ico" ]; then
            for svg in ico/*.svg; do
              if [ -f "$svg" ]; then
                fn=$(basename "$svg" .svg)
                rsvg-convert -w 96 -h 96 "$svg" -o "app/src/main/res/drawable/${fn}.png"
              fi
            done
          fi
          rm -rf ico

      - name: 整理配置
        run: |
          mkdir -p app/src/main/kotlin/com/fyan
          mv *.kt app/src/main/kotlin/com/fyan/ || true
          
          mkdir -p app/src/main/res/xml
          mv AndroidManifest.xml app/src/main/ || true
          find *.xml -type f ! -name 'AndroidManifest.xml' -exec mv {} app/src/main/res/xml/ \; || true
          
          mv app_build.gradle.kts app/build.gradle.kts || true

      - name: 编译环境
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
          cache-disabled: true

      - name: 执行构建
        env:
          GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=1024m -Dorg.gradle.logging.level=quiet"
        run: |
          gradle wrapper --gradle-version 8.7 > /dev/null
          chmod +x gradlew
          ./gradlew clean :app:assembleDebug --no-daemon --console=plain -Dkotlin.incremental=false

      - name: 提取产物
        id: copy
        run: |
          find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} fyan.apk \;
          echo "apk=fyan.apk" >> $GITHUB_OUTPUT

      - name: 更新明细
        id: commit
        run: |
          cm=$(git log --pretty=format:"%s" | while read m; do
            if [ -n "$m" ] && [ "$m" != "." ] && [ "$m" != " " ]; then
              echo "$m"
              break
            fi
          done)
          if [ -z "$m" ]; then
            m="尚未补充"
          fi
          echo "message=$m" >> $GITHUB_OUTPUT

      - name: 正式发布
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.copy.outputs.apk }}
          tag_name: ${{ github.ref_name }}
          name: 孚琰 ${{ github.ref_name }}
          body: |
            - **引擎架构**：原生双端自适应内核
            - **更新内容**：${{ steps.commit.outputs.message }}
          draft: false
          prerelease: false
