name: 打包发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  clear:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: 清理无效执行
        run: |
          echo ">>> 获取仓库所有 workflow runs"
          ALL_RUNS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100" \
            | jq -r '.workflow_runs[] | "\(.id)|\(.head_branch)|\(.status)|\(.conclusion)|\(.display_title)"')
          if [ -z "$ALL_RUNS" ]; then
            echo ">>> 没有找到任何 workflow runs"
            exit 0
          fi
          echo ">>> 当前 tag: ${{ github.ref_name }}"
          echo ">>> 当前 run: #${{ github.run_number }} (ID: ${{ github.run_id }})"
          DELETE_IDS=""
          while IFS= read -r line; do
            ID=$(echo "$line" | cut -d'|' -f1)
            BRANCH=$(echo "$line" | cut -d'|' -f2)
            STATUS=$(echo "$line" | cut -d'|' -f3)
            CONCLUSION=$(echo "$line" | cut -d'|' -f4)
            TITLE=$(echo "$line" | cut -d'|' -f5)
            if [ "$ID" = "${{ github.run_id }}" ]; then
              echo ">>> 跳过当前 run: #${{ github.run_number }} $ID"
              continue
            fi
            if [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ] || [ "$STATUS" = "cancelled" ] || [ "$BRANCH" = "${{ github.ref_name }}" ]; then
              echo ">>> 标记删除: $ID ($BRANCH, $STATUS, $CONCLUSION)"
              DELETE_IDS="$DELETE_IDS $ID"
            fi
          done <<< "$ALL_RUNS"
          if [ -z "$DELETE_IDS" ]; then
            echo ">>> 没有需要清理的 runs"
          else
            echo ">>> 正在删除..."
            for ID in $DELETE_IDS; do
              echo ">>> 删除 run $ID"
              STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$ID")
              if [ "$STATUS_CODE" = "204" ]; then
                echo "    ✅ 删除成功"
              else
                echo "    ❌ 删除失败 (HTTP $STATUS_CODE)"
              fi
            done
            echo ">>> 清理完成"
          fi

  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装节点
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 资源准备
        run: |
          rm -rf app .gradle *.lock
          mkdir -p app/src/main/res/{mipmap-{anydpi-v26,mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi},drawable,drawable-nodpi}
          
          mv icon.xml app/src/main/res/mipmap-anydpi-v26/
          mv icon_*.xml tv.xml app/src/main/res/drawable/
          for f in ico/*.svg;do
            [ -e "$f" ]||continue
            n=$(basename "$f" .svg)
            vb=$(grep -oiP '(?<=viewBox=")[^"]*' "$f"|head -n1|awk '{print $3,$4}')
            [ -z "$vb" ]&&vb="200 200"
            echo "<vector xmlns:android=\"http://schemas.android.com/apk/res/android\" android:width=\"200dp\" android:height=\"200dp\" android:viewportWidth=\"${vb% *}\" android:viewportHeight=\"${vb#* }\">">"app/src/main/res/drawable/$n.xml"
            grep -oiP '<path[^>]*/>' "$f"|while read -r p;do
              d=$(echo "$p"|grep -oiP '(?<=d=")[^"]*')
              fill=$(echo "$p"|grep -oiP '(?<=fill=")[^"]*')
              [ "$fill" = "none" -o -z "$fill" ]&&echo "<path android:pathData=\"$d\" />">>"app/src/main/res/drawable/$n.xml"||echo "<path android:fillColor=\"$fill\" android:pathData=\"$d\" />">>"app/src/main/res/drawable/$n.xml"
            done
            echo "</vector>">>"app/src/main/res/drawable/$n.xml"
          done
          rm -rf ico

      - name: 整理配置
        run: |
          mkdir -p app/src/main/kotlin/com/fyan
          mv *.kt app/src/main/kotlin/com/fyan/ || true
          
          mkdir -p app/src/main/res/xml
          mv AndroidManifest.xml app/src/main/ || true
          find . -maxdepth 1 -name "*.xml" -type f ! -name "AndroidManifest.xml" -exec mv {} app/src/main/res/xml/ \;
          
          mv app_build.gradle.kts app/build.gradle.kts || true

      - name: 编译环境
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
          cache-disabled: true

      - name: 执行构建
        env:
          GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=1024m -Dorg.gradle.logging.level=quiet"
        run: |
          gradle wrapper --gradle-version 8.7 > /dev/null 2>&1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --console=plain -Dkotlin.incremental=false > /dev/null

      - name: 提取产物
        id: copy
        run: |
          find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} fyan.apk \;
          echo "apk=fyan.apk" >> $GITHUB_OUTPUT

      - name: 更新明细
        id: commit
        run: |
          cm=$(git log --pretty=format:"%s" | while read m; do
            if [ -n "$m" ] && [ "$m" != "." ] && [ "$m" != " " ]; then
              echo "$m"
              break
            fi
          done)
          if [ -z "$m" ]; then
            m="尚未补充"
          fi
          echo "message=$m" >> $GITHUB_OUTPUT

      - name: 正式发布
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.copy.outputs.apk }}
          tag_name: ${{ github.ref_name }}
          name: 孚琰 ${{ github.ref_name }}
          body: |
            - **引擎架构**：原生双端自适应内核
            - **更新内容**：${{ steps.commit.outputs.message }}
          draft: false
          prerelease: false
