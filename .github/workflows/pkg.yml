name: 打包发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - name: 清理无效执行
        run: |
          ALL_RUNS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100" \
            | jq -r '.workflow_runs[] | "\(.id)|\(.head_branch)|\(.status)|\(.conclusion)"')
          
          for run in $ALL_RUNS; do
            ID=$(echo "$run" | cut -d'|' -f1)
            BRANCH=$(echo "$run" | cut -d'|' -f2)
            CONCLUSION=$(echo "$run" | cut -d'|' -f4)
            
            if [ "$ID" != "${{ github.run_id }}" ] && ([ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ] || [ "$BRANCH" = "${{ github.ref_name }}" ]); then
              curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$ID"
            fi
          done

  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置JDK
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 整理文档
        run: chmod +x ./.sh ; ./.sh

      - name: 下载工具
        run: |
          wget -q -nc -P ./ https://services.gradle.org/distributions/gradle-9.5.1-bin.zip
          mv gradle-9.5.1-bin.zip 9.5.1.zip
          $JAVA_HOME/bin/java -Xmx64m -Xms64m -Dorg.gradle.appname=oo -Dgradle.wrapper.properties=.properties -jar .jar help -q --console=plain --no-daemon --parallel

      - name: 解密签名
        run: echo "${{ secrets.KS_B64 }}" | base64 --decode > "$GITHUB_WORKSPACE/fyan.keystore"

      - name: 执行构建
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1024m -XX:+UseG1GC"
          KS_PATH: "${{ github.workspace }}/fyan.keystore"
          KS_PSWD: ${{ secrets.KS_PSWD }}
          K_ALIAS: ${{ secrets.K_ALIAS }}
          K_PSWD: ${{ secrets.K_PSWD }}
        run: |
          $JAVA_HOME/bin/java -Xmx64m -Xms64m -Dorg.gradle.appname=oo -Dgradle.wrapper.properties=.properties -jar .jar :app:assembleRelease --console=plain --no-daemon --parallel

      - name: 提取产物
        id: copy
        run: |
          APK_FILE=$(find app/build/outputs/apk/**/ -name "*.apk" | head -n 1)
          cp "$APK_FILE" fyan.apk
          echo "apk=fyan.apk" >> $GITHUB_OUTPUT

      - name: 更新明细
        id: commit
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            cm=$(git log --pretty=format:"%s" "$PREV_TAG..HEAD" | while read m; do
              if [ -n "$m" ] && [ "$m" != "." ] && [ "$m" != " " ]; then
                echo "$m"
              fi
            done)
          else
            cm=$(git log --pretty=format:"%s" | while read m; do
              if [ -n "$m" ] && [ "$m" != "." ] && [ "$m" != " " ]; then
                echo "$m"
                break
              fi
            done)
          fi
          if [ -z "$cm" ]; then
            cm="暂未补充"
          fi
          echo "message=$cm" >> $GITHUB_OUTPUT

      - name: 正式发布
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.copy.outputs.apk }}
          tag_name: ${{ github.ref_name }}
          name: 仏琰 ${{ github.ref_name }}
          body: |
            - **引擎架构**：原生双端自适应内核
            - **更新内容**：${{ steps.commit.outputs.message }}
