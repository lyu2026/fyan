name: 打包发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - name: 清理无效执行
        run: |
          ALL_RUNS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100" \
            | jq -r '.workflow_runs[] | "\(.id)|\(.head_branch)|\(.status)|\(.conclusion)"')
          
          for run in $ALL_RUNS; do
            ID=$(echo "$run" | cut -d'|' -f1)
            BRANCH=$(echo "$run" | cut -d'|' -f2)
            CONCLUSION=$(echo "$run" | cut -d'|' -f4)
            
            if [ "$ID" != "${{ github.run_id }}" ] && ([ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ] || [ "$BRANCH" = "${{ github.ref_name }}" ]); then
              curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs/$ID"
            fi
          done

  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 整理文档
        run: chmod +x ./.sh ; ./.sh

      - name: 缓存处理
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: 下载工具
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          chmod +x gradlew
          wget -q -nc -P ./gradle/wrapper/ https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
          ./gradlew help -Dorg.gradle.welcome.provider.enabled=false > /dev/null 2>&1
